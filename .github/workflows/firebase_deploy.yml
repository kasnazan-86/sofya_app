name: Firebase Deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify secrets exist
        run: |
          if [ -z "${{ secrets.FIREBASE_PROJECT_ID }}" ]; then
            echo "Missing FIREBASE_PROJECT_ID secret"; exit 1; fi
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "Missing FIREBASE_SERVICE_ACCOUNT_JSON secret"; exit 1; fi

      - name: Write service account key
        run: |
          cat > "${{ runner.temp }}/sa.json" << 'JSON'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          JSON

      - name: Install Firebase CLI
        run: npm i -g firebase-tools

      # ✅ مهم: تثبيت حزم functions داخل مجلد functions
      - name: Install functions dependencies
        working-directory: functions
        run: |
          node -v
          npm -v
          ls -la
          test -f package.json || (echo "functions/package.json not found" && exit 1)
          cat package.json
          npm ci || npm install

      - name: Deploy to Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: |
          firebase --version
          firebase deploy --project "${{ secrets.FIREBASE_PROJECT_ID }}" --only firestore:rules,functions,hosting
