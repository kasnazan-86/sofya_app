name: sofya_app
description: Sofya Taxi App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # 🔥 Firebase Core
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  cloud_functions: ^4.6.8
  firebase_storage: ^11.6.8

  # 🛡 Firebase App Check
  firebase_app_check: ^0.2.2

  # 📍 Location & Maps
  geolocator: ^10.1.0
  google_maps_flutter: ^2.6.0
  flutter_polyline_points: ^2.0.0
  http: ^1.2.0

  # 🧠 State Management
  provider: ^6.1.2

  # 📷 Media
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/car.png